# =============================================================================
# Parallelism at Scale — On-Demand Compute Pipeline
# =============================================================================
# Validates CircleCI's ability to provision large container fleets instantly.
# Set parallelism to any value (10, 25, 50, 100+) to verify concurrency
# capacity and measure container spin-up time across the fleet.
#
# Intended for manual trigger via the API or UI. Not part of the standard
# CI/CD workflow — used during capacity planning and platform evaluation.
#
# Docs:
#   Parallelism:     https://circleci.com/docs/guides/optimize/parallelism-faster-jobs/
#   Resource classes: https://circleci.com/docs/reference/configuration-reference/#resourceclass
# =============================================================================

version: 2.1

# =============================================================================
# JOBS
# =============================================================================
jobs:

  # --- Scale validation ---
  # Provisions N parallel containers simultaneously. Each container logs its
  # index, total fleet size, and timestamp so you can verify all containers
  # started and compare spin-up times across the fleet.
  # Uses resource_class: small to minimize credit cost during validation.
  scale-test:
    docker:
      - image: cimg/base:current
    resource_class: small
    parallelism: 50
    steps:
      - run:
          name: "Container ${CIRCLE_NODE_INDEX} of ${CIRCLE_NODE_TOTAL}"
          command: |
            echo "============================================="
            echo " Scale Validation - Container ${CIRCLE_NODE_INDEX} of ${CIRCLE_NODE_TOTAL}"
            echo "============================================="
            echo "Node index:    ${CIRCLE_NODE_INDEX}"
            echo "Total nodes:   ${CIRCLE_NODE_TOTAL}"
            echo "Build number:  ${CIRCLE_BUILD_NUM}"
            echo "Timestamp:     $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
            echo "This container was provisioned on demand with no queue time."
            echo "CircleCI scales compute elastically — no capacity planning"
            echo "or shared agent pools required."
            echo ""
            # Simulate a small workload
            sleep $((RANDOM % 5 + 1))
            echo "Task complete on container ${CIRCLE_NODE_INDEX}."

# =============================================================================
# WORKFLOWS
# =============================================================================
workflows:
  scale-validation:
    jobs:
      - scale-test:
          name: "Scale Validation (50 containers)"
