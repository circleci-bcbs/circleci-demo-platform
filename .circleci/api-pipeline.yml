# =============================================================================
# API Service Pipeline
# =============================================================================
# Builds, tests, and packages the Flask REST API service.
# Features: test splitting, Docker Layer Caching, deploy markers.
#
# Docs:
#   Test splitting:  https://circleci.com/docs/guides/optimize/parallelism-faster-jobs/
#   DLC:             https://circleci.com/docs/guides/optimize/docker-layer-caching/
#   Deploy markers:  https://circleci.com/docs/guides/deploy/configure-deploy-markers/
# =============================================================================

version: 2.1

orbs:
  python: circleci/python@2.1.1
  docker: circleci/docker@2.8.2
  # Shared URL orb — common commands used across all BCBSM projects
  # Docs: https://circleci.com/docs/orbs/author/create-test-and-use-url-orbs/
  platform: https://raw.githubusercontent.com/circleci-bcbs/shared-orbs/main/bcbsm-platform-tools.yml

# =============================================================================
# JOBS
# =============================================================================
jobs:

  # --- Test with splitting ---
  # Splits pytest tests across parallel containers by timing data.
  # On first run, tests split by file name. After timing data is collected,
  # subsequent runs split by duration for optimal balance.
  test:
    docker:
      - image: cimg/python:3.12
    parallelism: 4
    steps:
      - checkout
      - python/install-packages:
          pkg-manager: pip
          pip-dependency-file: api/requirements.txt
      - run:
          name: Run API tests with splitting
          command: |
            TEST_FILES=$(circleci tests glob "api/tests/test_*.py" | circleci tests split --split-by=timings)
            echo "Running tests: ${TEST_FILES}"
            mkdir -p /tmp/test-results
            python -m pytest ${TEST_FILES} \
              --junitxml=/tmp/test-results/api-results.xml \
              -v
      - store_test_results:
          path: /tmp/test-results
      - store_artifacts:
          path: /tmp/test-results
          destination: test-results

  # --- Build Docker image ---
  # Uses Docker Layer Caching to speed up image builds.
  # Pushes to a registry (or stores as artifact in sandbox).
  build-image:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Build API Docker image
          command: |
            cd api
            docker build -t circleci-demo-platform/api:${CIRCLE_SHA1:0:7} .
            docker build -t circleci-demo-platform/api:latest .
            echo "Image built: circleci-demo-platform/api:${CIRCLE_SHA1:0:7}"
            # In production: docker push to ECR/DockerHub/Artifactory
      - run:
          name: Save image digest
          command: |
            docker inspect circleci-demo-platform/api:latest --format='{{.Id}}' > /tmp/image-digest.txt
            cat /tmp/image-digest.txt
      - store_artifacts:
          path: /tmp/image-digest.txt
          destination: image-digest

  # --- Deploy ---
  # Uses shared platform orb for deploy markers and notifications.
  deploy:
    executor: platform/base
    steps:
      - platform/deploy-marker-plan:
          deploy-name: "api-deploy"
          environment-name: "DEV"
          component-name: "api"
          target-version: "${CIRCLE_SHA1:0:7}"
      - platform/deploy-marker-update:
          deploy-name: "api-deploy"
          status: "RUNNING"
      - run:
          name: Deploy API service
          command: |
            echo "Deploying API service..."
            echo "Image: circleci-demo-platform/api:${CIRCLE_SHA1:0:7}"
            echo "[SANDBOX] Deploy complete."
      - platform/deploy-marker-finalize:
          deploy-name: "api-deploy"

# =============================================================================
# WORKFLOWS
# =============================================================================
workflows:
  api-build-test-deploy:
    # Auto-rerun up to 5 times on failure — builds up flaky test data
    # in CircleCI Insights for automatic flaky test detection.
    # Docs: https://circleci.com/docs/guides/orchestrate/automatic-reruns/
    max_auto_reruns: 5
    jobs:
      - test:
          name: "API Tests (split)"
      - build-image:
          name: "API Docker Build (DLC)"
          requires:
            - "API Tests (split)"
      - deploy:
          name: "Deploy API"
          requires:
            - "API Docker Build (DLC)"
