# =============================================================================
# API Service Pipeline
# =============================================================================
# Builds, tests, and packages the Flask REST API service.
#
# Features:
#   - Test splitting across parallel containers to reduce wall-clock test time
#   - Docker Layer Caching (DLC) to avoid rebuilding unchanged image layers
#   - Deploy markers for release tracking in CircleCI Releases
#   - Automatic reruns to surface flaky tests in Insights
#
# Docs:
#   Test splitting:  https://circleci.com/docs/guides/optimize/parallelism-faster-jobs/
#   DLC:             https://circleci.com/docs/guides/optimize/docker-layer-caching/
#   Deploy markers:  https://circleci.com/docs/guides/deploy/configure-deploy-markers/
#   Auto reruns:     https://circleci.com/docs/guides/orchestrate/automatic-reruns/
#   URL orbs:        https://circleci.com/docs/orbs/use/orb-intro/#url-orbs
# =============================================================================

version: 2.1

# =============================================================================
# PIPELINE PARAMETERS
# Docs: https://circleci.com/docs/guides/orchestrate/pipeline-variables/
# =============================================================================
# Parameters injected by the path-filtering orb from the setup workflow.
# Every continuation config must declare the full set of parameters even if
# only a subset is relevant — omitting any causes the continuation to fail.
parameters:
  run-api:
    type: boolean
    default: false
  run-worker:
    type: boolean
    default: false
  run-web:
    type: boolean
    default: false
  run-all:
    type: boolean
    default: false

# =============================================================================
# ORBS
# Docs: https://circleci.com/docs/orbs/use/orb-intro/
# =============================================================================
orbs:
  # Python convenience commands (install-packages, cache management).
  # See: https://circleci.com/developer/orbs/orb/circleci/python
  python: circleci/python@2.1.1
  # Docker build/push helpers and remote Docker setup.
  # See: https://circleci.com/developer/orbs/orb/circleci/docker
  docker: circleci/docker@2.8.2
  # Shared URL orb — reusable commands and executors maintained centrally.
  # URL orbs are fetched at pipeline compile time from a remote YAML file,
  # allowing updates without publishing to the orb registry.
  # Docs: https://circleci.com/docs/orbs/use/orb-intro/#url-orbs
  platform: https://raw.githubusercontent.com/circleci-bcbs/shared-orbs/main/bcbsm-platform-tools.yml

# =============================================================================
# JOBS
# =============================================================================
jobs:

  # --- Test with splitting ---
  # Splits pytest tests across parallel containers by timing data.
  # On first run (no timing data available), tests split alphabetically by
  # file name. After timing data is collected from store_test_results,
  # subsequent runs split by historical duration for optimal balance.
  test:
    docker:
      - image: cimg/python:3.12
    parallelism: 4
    steps:
      - checkout
      - python/install-packages:
          pkg-manager: pip
          pip-dependency-file: api/requirements.txt
      - run:
          name: Run API tests with splitting
          command: |
            TEST_FILES=$(circleci tests glob "api/tests/test_*.py" | circleci tests split --split-by=timings)
            echo "Running tests: ${TEST_FILES}"
            mkdir -p /tmp/test-results
            python -m pytest ${TEST_FILES} \
              --junitxml=/tmp/test-results/api-results.xml \
              -v
      # Upload results so CircleCI can track timing data for intelligent
      # splitting and surface test failures in the Tests tab.
      - store_test_results:
          path: /tmp/test-results
      - store_artifacts:
          path: /tmp/test-results
          destination: test-results

  # --- Build Docker image ---
  # Uses Docker Layer Caching (DLC) to skip rebuilding unchanged layers,
  # reducing typical build times from minutes to seconds on cache hit.
  # In production, the image would be pushed to ECR/DockerHub/Artifactory.
  build-image:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Build API Docker image
          command: |
            cd api
            docker build -t circleci-demo-platform/api:${CIRCLE_SHA1:0:7} .
            docker build -t circleci-demo-platform/api:latest .
            echo "Image built: circleci-demo-platform/api:${CIRCLE_SHA1:0:7}"
            # In production: docker push to ECR/DockerHub/Artifactory
      - run:
          name: Save image digest
          command: |
            docker inspect circleci-demo-platform/api:latest --format='{{.Id}}' > /tmp/image-digest.txt
            cat /tmp/image-digest.txt
      - store_artifacts:
          path: /tmp/image-digest.txt
          destination: image-digest

  # --- Deploy ---
  # Records a deploy marker in CircleCI Releases via the shared platform orb.
  # Deploy markers provide an audit trail: which SHA was deployed, to which
  # environment, and whether the deploy succeeded or failed.
  # Docs: https://circleci.com/docs/guides/deploy/configure-deploy-markers/
  deploy:
    executor: platform/base
    steps:
      - platform/deploy-marker-plan:
          deploy-name: "api-deploy"
          environment-name: "DEV"
          component-name: "api"
          target-version: "${CIRCLE_SHA1:0:7}"
      - platform/deploy-marker-update:
          deploy-name: "api-deploy"
          status: "RUNNING"
      - run:
          name: Deploy API service
          command: |
            echo "Deploying API service..."
            echo "Image: circleci-demo-platform/api:${CIRCLE_SHA1:0:7}"
            echo "[SANDBOX] Deploy complete."
      - platform/deploy-marker-finalize:
          deploy-name: "api-deploy"

# =============================================================================
# WORKFLOWS
# =============================================================================
workflows:
  api-build-test-deploy:
    # Auto-rerun up to 5 times on infrastructure or test failure.
    # Failed-then-passed runs are flagged as flaky in CircleCI Insights,
    # building data for automatic flaky test detection over time.
    # Docs: https://circleci.com/docs/guides/orchestrate/automatic-reruns/
    max_auto_reruns: 5
    jobs:
      - test:
          name: "API Tests (split)"
      - build-image:
          name: "API Docker Build (DLC)"
          requires:
            - "API Tests (split)"
      - deploy:
          name: "Deploy API"
          requires:
            - "API Docker Build (DLC)"
