# =============================================================================
# Dynamic Config — Setup Workflow (Path Filtering)
# =============================================================================
# This is the only triggered pipeline. On every push, this setup workflow
# detects which directories changed and selects the right service config
# to run as the continuation.
#
# Path -> Config file mapping:
#   api/    -> .circleci/api-pipeline.yml
#   worker/ -> .circleci/worker-pipeline.yml
#   web/    -> .circleci/web-pipeline.yml
#   shared/ -> all three (shared code affects every service)
#
# The per-service pipeline definitions still exist for manual API/UI
# triggers, but have no automatic triggers. The scale-demo pipeline
# is also manual-only.
#
# Docs:
#   Dynamic config:  https://circleci.com/docs/guides/orchestrate/dynamic-config/
#   Path filtering:  https://circleci.com/developer/orbs/orb/circleci/path-filtering
# =============================================================================

version: 2.1

setup: true

orbs:
  path-filtering: circleci/path-filtering@3.0.0

workflows:
  detect-changes:
    jobs:
      - path-filtering/filter:
          name: "Detect Changed Services"
          # Fourth column selects the continuation config file.
          # When multiple paths match, configs are merged.
          # When no service paths match (e.g., .circleci/ changes only),
          # the default config-path is used as a fallback.
          mapping: |
            api/.* run-api true .circleci/api-pipeline.yml
            worker/.* run-worker true .circleci/worker-pipeline.yml
            web/.* run-web true .circleci/web-pipeline.yml
            shared/.* run-all true .circleci/api-pipeline.yml
          base-revision: main
          config-path: .circleci/api-pipeline.yml
