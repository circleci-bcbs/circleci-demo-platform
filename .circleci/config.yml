# =============================================================================
# Dynamic Config — Setup Workflow (Path Filtering)
# =============================================================================
# The only auto-triggered pipeline. Detects which service directories have
# changed files and routes to the correct service config as a continuation.
#
# Routing:
#   api/    -> api-pipeline.yml
#   worker/ -> worker-pipeline.yml
#   web/    -> web-pipeline.yml
#   shared/ -> all three service configs (shared code affects every service)
#   other   -> no-updates.yml (no-op, consumes no credits)
#
# Per-service pipeline definitions remain for manual API/UI triggers.
#
# Docs:
#   Dynamic config:  https://circleci.com/docs/guides/orchestrate/dynamic-config/
#   Path filtering:  https://circleci.com/developer/orbs/orb/circleci/path-filtering
#   No-op jobs:      https://circleci.com/docs/reference/configuration-reference/#job-type
# =============================================================================

version: 2.1

setup: true

orbs:
  path-filtering: circleci/path-filtering@3.0.0

workflows:
  detect-changes:
    jobs:
      - path-filtering/filter:
          name: "Detect Changed Services"
          # Fourth column selects the continuation config file per match.
          # shared/ maps to all three service configs so every service rebuilds.
          # When no paths match, config-path (no-updates.yml) is used as fallback.
          mapping: |
            api/.* run-api true .circleci/api-pipeline.yml
            worker/.* run-worker true .circleci/worker-pipeline.yml
            web/.* run-web true .circleci/web-pipeline.yml
            shared/.* run-all true .circleci/api-pipeline.yml
            shared/.* run-all true .circleci/worker-pipeline.yml
            shared/.* run-all true .circleci/web-pipeline.yml
          base-revision: main
          config-path: .circleci/no-updates.yml
