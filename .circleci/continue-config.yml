# =============================================================================
# Dynamic Config — Continuation Config
# =============================================================================
# Receives parameters from the setup workflow (config.yml) and conditionally
# runs only the workflows for services that have changed files.
#
# Parameters are set by the path-filtering orb:
#   run-api:    true if files in api/ changed
#   run-worker: true if files in worker/ changed
#   run-web:    true if files in web/ changed
#
# If shared/ changed, all three parameters are set to true.
# =============================================================================

version: 2.1

orbs:
  python: circleci/python@2.1.1
  docker: circleci/docker@2.8.2

# Parameters set by the setup workflow's path-filtering orb
parameters:
  run-api:
    type: boolean
    default: false
  run-worker:
    type: boolean
    default: false
  run-web:
    type: boolean
    default: false

# =============================================================================
# JOBS — shared across all service workflows
# =============================================================================
jobs:

  test:
    docker:
      - image: cimg/python:3.12
    parameters:
      service:
        type: string
    parallelism: 3
    steps:
      - checkout
      - python/install-packages:
          pkg-manager: pip
          pip-dependency-file: << parameters.service >>/requirements.txt
      - run:
          name: "Run << parameters.service >> tests"
          command: |
            TEST_FILES=$(circleci tests glob "<< parameters.service >>/tests/test_*.py" | circleci tests split --split-by=timings)
            echo "Running: ${TEST_FILES}"
            mkdir -p /tmp/test-results
            python -m pytest ${TEST_FILES} \
              --junitxml=/tmp/test-results/<< parameters.service >>-results.xml -v
      - store_test_results:
          path: /tmp/test-results
      - store_artifacts:
          path: /tmp/test-results

  build-image:
    docker:
      - image: cimg/base:current
    parameters:
      service:
        type: string
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: "Build << parameters.service >> image"
          command: |
            cd << parameters.service >>
            docker build -t demo/<< parameters.service >>:${CIRCLE_SHA1:0:7} .
            echo "Built: demo/<< parameters.service >>:${CIRCLE_SHA1:0:7}"

# =============================================================================
# WORKFLOWS — conditionally run based on path-filtering parameters
# =============================================================================
workflows:

  api-service:
    when: << pipeline.parameters.run-api >>
    jobs:
      - test:
          name: "API Tests"
          service: api
      - build-image:
          name: "API Docker Build"
          service: api
          requires:
            - "API Tests"

  worker-service:
    when: << pipeline.parameters.run-worker >>
    jobs:
      - test:
          name: "Worker Tests"
          service: worker
      - build-image:
          name: "Worker Docker Build"
          service: worker
          requires:
            - "Worker Tests"

  web-service:
    when: << pipeline.parameters.run-web >>
    jobs:
      - test:
          name: "Web Tests"
          service: web
      - build-image:
          name: "Web Docker Build"
          service: web
          requires:
            - "Web Tests"
